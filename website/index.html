<!doctype html>
<html lang="en" data-color-scheme="dark">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Alfred — Your Knowledge Companion</title>
    <meta
      name="description"
      content="Chat with your knowledge base, revise past learnings, and generate reports — all powered by AI."
    />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&family=Sora:wght@400;500;600;700;800&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="/src/style.css" />
    <script>
      // Restore persisted theme before first paint
      (function () {
        const saved = localStorage.getItem("alfred-theme") || "dark";
        document.documentElement.setAttribute("data-color-scheme", saved);
      })();
    </script>
  </head>
  <body>
    <div id="app"></div>
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
